name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Gate the deploy on the token existing, so the workflow still validates +
      # builds (and stays green) before the CLOUDFLARE_API_TOKEN secret is added.
      HAS_CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Validate dataset
        run: bun run validate-data
      - name: Build
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://localmodel.run' }}
        run: bun run build
      - name: Deploy to Cloudflare Pages
        if: env.HAS_CF_TOKEN == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=localmodel-run
      - name: Deploy skipped (no token)
        if: env.HAS_CF_TOKEN != 'true'
        run: echo "::notice::CLOUDFLARE_API_TOKEN secret not set — built and validated, skipped deploy. Add the secret to enable auto-deploy."
