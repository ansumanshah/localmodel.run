version: 2
updates:
  # JS dependencies (npm ecosystem covers the bun-managed package.json).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      # One PR for the routine minor/patch bumps; majors come through on their own.
      minor-and-patch:
        update-types: ["minor", "patch"]

  # Keep the GitHub Actions themselves current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"
